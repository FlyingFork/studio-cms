services:
  app:
    build:
      context: .
      args:
        PORT: ${PORT:-3000}
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
    networks:
      - shared-db
    restart: unless-stopped

networks:
  shared-db:
    external: true